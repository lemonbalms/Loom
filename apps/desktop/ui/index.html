<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loom</title>
    <link rel="icon" type="image/svg+xml" href="web-colorful.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="top">
      <div class="brand">
        <span class="logo" aria-hidden="true">◈</span>
        <h1>Loom</h1>
        <span id="version-tag" class="muted">desktop 0.12.2</span>
      </div>
      <nav class="tabs" role="tablist">
        <button type="button" class="tab active" data-tab="status" role="tab">
          Status
        </button>
        <button type="button" class="tab" data-tab="peers" role="tab">Peers</button>
        <button type="button" class="tab" data-tab="send" role="tab">Send</button>
        <button type="button" class="tab" data-tab="inbox" role="tab">
          Inbox <span id="badge-inbox" class="badge" hidden></span>
        </button>
        <button type="button" class="tab" data-tab="board" role="tab">
          Board <span id="badge-board" class="badge" hidden></span>
        </button>
      </nav>
      <div class="toolbar">
        <label class="auto-label muted">
          <input type="checkbox" id="auto-refresh" checked />
          Auto 5s
        </label>
        <span id="last-refresh" class="muted"></span>
        <button type="button" id="btn-refresh" class="btn primary" title="Refresh (R)">
          Refresh
        </button>
      </div>
    </header>

    <div id="banner" class="banner hidden" role="status"></div>

    <main>
      <section id="panel-status" class="panel active" role="tabpanel">
        <h2>Host status</h2>
        <dl id="status-dl" class="kv"></dl>
        <p id="status-cta" class="cta muted"></p>
        <div class="invite-box card" id="invite-box" hidden>
          <div class="card-head">
            <strong>Invite</strong>
            <span class="pill">share</span>
          </div>
          <p id="invite-code" class="body-text mono"></p>
          <p id="invite-hint" class="muted"></p>
        </div>
      </section>

      <section id="panel-peers" class="panel" role="tabpanel" hidden>
        <h2>Peers</h2>
        <p id="peers-meta" class="muted"></p>
        <ul id="peers-list" class="list"></ul>
      </section>

      <section id="panel-send" class="panel" role="tabpanel" hidden>
        <h2>Send handoff / chat</h2>
        <p class="muted">Uses sticky host RPC (same as CLI). Body is never HTML-injected.</p>
        <form id="send-form" class="send-form">
          <label class="field">
            <span class="muted">To</span>
            <select id="send-to" required></select>
          </label>
          <label class="field">
            <span class="muted">Mode</span>
            <select id="send-mode">
              <option value="message">message</option>
              <option value="task">task</option>
              <option value="chat">room chat</option>
            </select>
          </label>
          <label class="field">
            <span class="muted">Body</span>
            <textarea
              id="send-body"
              rows="5"
              maxlength="10000"
              placeholder="Handoff body…"
              required
            ></textarea>
          </label>
          <button type="submit" class="btn primary" id="send-submit">Send</button>
        </form>
      </section>

      <section id="panel-inbox" class="panel" role="tabpanel" hidden>
        <h2>Inbox</h2>
        <p id="inbox-meta" class="muted"></p>
        <ul id="inbox-list" class="list"></ul>
      </section>

      <section id="panel-board" class="panel" role="tabpanel" hidden>
        <h2>Board</h2>
        <p id="board-meta" class="muted"></p>
        <form id="board-add" class="board-add">
          <input
            id="board-title"
            type="text"
            maxlength="200"
            placeholder="New task title"
            autocomplete="off"
          />
          <button type="submit" class="btn primary">Add</button>
        </form>
        <ul id="board-list" class="list"></ul>
      </section>
    </main>

    <footer class="foot muted">
      Sticky host only · text never HTML-injected · Send via sticky RPC · press R to refresh
    </footer>

    <script src="app.js"></script>
  </body>
</html>
